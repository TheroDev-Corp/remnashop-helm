name: Remnashop - Dev

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  packages: write

jobs:
  docker-build:
    name: 🏗️ Build and Push Dev Image
    runs-on: ubuntu-latest

    outputs:
      image_tags: ${{ steps.vars.outputs.image_tags }}
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔤 Set Lowercase Repository Name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: 🛠️ Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Define Tags & Outputs
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          IMAGE_REPO="ghcr.io/${{ env.REPO_LC }}"
          IMAGE_TAGS="${IMAGE_REPO}:dev,${IMAGE_REPO}:dev-${SHORT_SHA}"

          echo "image_tags=${IMAGE_TAGS}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT

          echo "✅ Tags: ${IMAGE_TAGS}"

      - name: 🏗️ Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.vars.outputs.image_tags }}
          build-args: |
            BUILD_TIME=${{ steps.vars.outputs.build_time }}
            BUILD_BRANCH=${{ github.ref_name }}
            BUILD_COMMIT=${{ steps.vars.outputs.short_sha }}
            BUILD_TAG=dev

  release:
    name: 📦 Publish Dev Artifact
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4

      - name: 🧱 Generate Build Metadata
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BRANCH="${{ github.ref_name }}"
          FULL_SHA="${{ github.sha }}"
          SHORT_SHA="${{ needs.docker-build.outputs.short_sha }}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/$SHORT_SHA"

          cat <<EOF > build.info.json
          {
            "buildTime": "$BUILD_TIME",
            "commitFull": "$FULL_SHA",
            "commit": "$SHORT_SHA",
            "tag": "dev",
            "branch": "$BRANCH",
            "commitUrl": "$COMMIT_URL"
          }
          EOF

      - name: 📁 Archive Project Files
        run: |
          zip -r remnashop-dev.zip . \
            -x ".git/*" ".github/*" "logs/*" "*.zip" "node_modules/*"

      - name: 🧹 Remove Previous Artifact (Ignore if fails)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete-asset dev-build remnashop-dev.zip || true

      - name: ⬆️ Upload Artifact to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload dev-build remnashop-dev.zip --clobber

      - name: 📝 Update Release Notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          SHORT_SHA="${{ needs.docker-build.outputs.short_sha }}"

          gh release edit dev-build --notes-file - <<EOF
          🔁 Updated development build
          🔗 [Commit]($COMMIT_URL)
          🏷️ Tags:
          • \`dev\`
          • \`dev-$SHORT_SHA\`
          📅 Built: $DATE
          EOF