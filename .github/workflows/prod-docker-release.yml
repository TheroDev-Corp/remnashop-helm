name: Remnashop - Release

on:
  release:
    types: [published]
  workflow_dispatch: 

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: 🚀 Build and Release Prod
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔤 Set Lowercase Repository Name
        id: repo_name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: 🏷️ Define Build Args
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          IMAGE_REPO="ghcr.io/${{ env.REPO_LC }}"
          
          BUILD_TAG="${{ github.ref_name }}"
          IMAGE_TAGS="${IMAGE_REPO}:latest,${IMAGE_REPO}:${BUILD_TAG}"

          echo "image_tags=${IMAGE_TAGS}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT
          echo "build_tag=${BUILD_TAG}" >> $GITHUB_OUTPUT
          
          echo "✅ Tags: ${IMAGE_TAGS}"
          echo "✅ SHA: ${SHORT_SHA}"

      - name: 🛠️ Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.vars.outputs.image_tags }}
          build-args: |
            BUILD_TIME=${{ steps.vars.outputs.build_time }}
            BUILD_BRANCH=${{ github.ref_name }}
            BUILD_COMMIT=${{ steps.vars.outputs.short_sha }}
            BUILD_TAG=${{ steps.vars.outputs.build_tag }}

      - name: 📦 Create GitHub Release Notes
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Remnashop ${{ github.ref_name }}
          generate_release_notes: true
          append_body: true
          body: |
            ---

            ## 🐳 Docker Images

            ### Latest:
            ```bash
            ghcr.io/${{ env.REPO_LC }}:latest
            ```

            ### Versioned:
            ```bash
            ghcr.io/${{ env.REPO_LC }}:${{ github.ref_name }}
            ```