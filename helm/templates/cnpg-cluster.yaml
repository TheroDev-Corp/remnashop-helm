{{- if .Values.cnpg.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "remnashop.fullname" . }}-db
  labels:
    {{- include "remnashop.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.cnpg.instances }}
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6
  
  primaryUpdateStrategy: unsupervised

  storage:
    size: {{ .Values.cnpg.storage.size }}
    storageClass: {{ .Values.cnpg.storage.storageClass }}

  bootstrap:
    initdb:
      database: remnashop
      owner: remnashop
{{- end }}