{{- if .Values.cnpg.enabled -}}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "remnashop.fullname" . }}-db
  labels:
    {{- include "remnashop.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.cnpg.instances }}
  
  storage:
    size: {{ .Values.cnpg.storage.size | quote }}
    {{- if .Values.cnpg.storage.storageClass }}
    storageClass: {{ .Values.cnpg.storage.storageClass | quote }}
    {{- end }}

  bootstrap:
    initdb:
      database: remnashop
      owner: remnashop
      secret:
        name: {{ include "remnashop.fullname" . }}-db-app
{{- end }}
