apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "remnashop.fullname" . }}-scheduler
  labels:
    {{- include "remnashop.labels" . | nindent 4 }}
    app.kubernetes.io/component: taskiq-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "remnashop.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: taskiq-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "remnashop.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: taskiq-scheduler
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:17-alpine
          command:
            - sh
            - -c
            - "until pg_isready -h $DATABASE_HOST -p $DATABASE_PORT -U $DATABASE_USER; do echo waiting for database; sleep 2; done;"
          envFrom:
            - configMapRef:
                name: {{ include "remnashop.fullname" . }}-config
      containers:
        - name: scheduler
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          command: 
            - "taskiq"
            - "scheduler"
            - "src.infrastructure.taskiq.scheduler:scheduler"
            - "--tasks-pattern"
            - "src/infrastructure/taskiq/tasks/*.py"
            - "-fsd"
          envFrom:
            - configMapRef:
                name: {{ include "remnashop.fullname" . }}-config
            - secretRef:
                name: {{ include "remnashop.secretName" . }}
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "remnashop.fullname" . }}-db-app
                  key: password
          resources:
            {{- toYaml .Values.scheduler.resources | nindent 12 }}