apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "remnashop.fullname" . }}-db-migrate
  labels:
    {{- include "remnashop.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      name: {{ include "remnashop.fullname" . }}-db-migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-db
          image: postgres:17-alpine
          command:
            - sh
            - -c
            - "until pg_isready -h $DATABASE_HOST -p $DATABASE_PORT -U $DATABASE_USER; do echo waiting for database; sleep 2; done;"
          envFrom:
            - configMapRef:
                name: {{ include "remnashop.fullname" . }}-config
      containers:
        - name: alembic-upgrade
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          command: ["alembic", "-c", "src/infrastructure/database/alembic.ini", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: {{ include "remnashop.fullname" . }}-config
            - secretRef:
                name: {{ include "remnashop.secretName" . }}
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "remnashop.fullname" . }}-db-app
                  key: password