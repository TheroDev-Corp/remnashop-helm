{{- if .Values.assets.persistence.enabled -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "remnashop.fullname" . }}-assets
  labels:
    {{- include "remnashop.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.assets.persistence.accessMode | quote }}
  resources:
    requests:
      storage: {{ .Values.assets.persistence.size | quote }}
  {{- if .Values.assets.persistence.storageClass }}
  storageClassName: {{ .Values.assets.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
