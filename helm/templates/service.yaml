apiVersion: v1
kind: Service
metadata:
  name: {{ include "remnashop.fullname" . }}
  labels:
    {{- include "remnashop.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.config.appPort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "remnashop.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: main-app