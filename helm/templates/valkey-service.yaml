{{- if .Values.valkey.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "remnashop.fullname" . }}-valkey
  labels:
    {{- include "remnashop.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: valkey
      protocol: TCP
      name: valkey
  selector:
    app.kubernetes.io/name: {{ include "remnashop.name" . }}-valkey
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}