{{- if .Values.valkey.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "remnashop.fullname" . }}-valkey
  labels:
    {{- include "remnashop.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "remnashop.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "remnashop.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: valkey
    spec:
      containers:
        - name: valkey
          image: "{{ .Values.valkey.image.repository }}:{{ .Values.valkey.image.tag }}"
          ports:
            - containerPort: 6379
              name: redis
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "remnashop.fullname" . }}-valkey
  labels:
    {{- include "remnashop.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/name: {{ include "remnashop.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: valkey
{{- end }}
